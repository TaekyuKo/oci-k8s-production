---
- name: Check if ArgoCD is already installed
  stat:
    path: /home/ubuntu/.argocd-installed
  register: argocd_installed

- name: Create argocd namespace
  shell: kubectl create namespace argocd --dry-run=client -o yaml | kubectl apply -f -
  become_user: ubuntu
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config

- name: Install ArgoCD
  shell: |
    kubectl apply -n argocd -f https://raw.githubusercontent.com/argoproj/argo-cd/v{{ argocd_version }}/manifests/install.yaml
  become_user: ubuntu
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  when: not argocd_installed.stat.exists

- name: Wait for ArgoCD deployments to be ready
  shell: kubectl wait --for=condition=available deployment --all -n argocd --timeout=300s
  become_user: ubuntu
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  when: not argocd_installed.stat.exists

- name: Patch ArgoCD server service to NodePort
  shell: |
    kubectl patch svc argocd-server -n argocd -p '{"spec": {"type": "NodePort", "ports": [{"port": 443, "nodePort": 30080, "name": "https"}]}}'
  become_user: ubuntu
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  when: not argocd_installed.stat.exists

- name: Mark ArgoCD as installed
  file:
    path: /home/ubuntu/.argocd-installed
    state: touch
    owner: ubuntu
    group: ubuntu
  when: not argocd_installed.stat.exists
